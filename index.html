<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top 1% Prompt Builder</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #0f0e0c; }

    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity: .4; }
      40%          { transform: translateY(-7px); opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg      { animation: fadeUp .3s ease forwards; }
    textarea  { resize: none; }
    textarea:focus { outline: none; }
    ::-webkit-scrollbar       { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #2a2820; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    "use strict";

    const { useState, useRef, useEffect } = React;
    const h = React.createElement;

    const QUESTIONS = [
      "What are you trying to accomplish? (your core goal)",
      "What's your relevant background or context for this?",
      "What have you already tried, or what constraints do you have?",
      "What does your ideal output look like — format, tone, length?"
    ];

    async function callClaude(systemPrompt, userContent) {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: "user", content: userContent }]
        })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      return data.content[0].text.trim();
    }

    function TypingDots() {
      return h("div", { style: { display: "flex", gap: 5, padding: "10px 0 4px" } },
        [0, 1, 2].map(function(i) {
          return h("div", {
            key: i,
            style: {
              width: 7, height: 7, borderRadius: "50%", background: "#c8a96e",
              animation: "bounce 1.2s infinite",
              animationDelay: (i * 0.2) + "s"
            }
          });
        })
      );
    }

    function PromptBuilder() {
      const [phase, setPhase]                     = useState("intro");
      const [chatMessages, setChatMessages]       = useState([]);
      const [answers, setAnswers]                 = useState([]);
      const [input, setInput]                     = useState("");
      const [loading, setLoading]                 = useState(false);
      const [generatedPrompt, setGeneratedPrompt] = useState("");
      const [copied, setCopied]                   = useState(false);
      const [errMsg, setErrMsg]                   = useState("");
      const bottomRef = useRef(null);
      const inputRef  = useRef(null);

      useEffect(function() {
        if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" });
      }, [chatMessages, loading]);

      function startInterview() {
        setPhase("chat");
        setChatMessages([{ role: "assistant", content: QUESTIONS[0] }]);
        setAnswers([]);
        setErrMsg("");
        setTimeout(function() { if (inputRef.current) inputRef.current.focus(); }, 100);
      }

      async function submitAnswer() {
        if (!input.trim() || loading) return;
        const answer = input.trim();
        setInput("");
        setErrMsg("");

        const newAnswers = [...answers, answer];
        setAnswers(newAnswers);
        setChatMessages(function(prev) { return [...prev, { role: "user", content: answer }]; });

        const qIndex = newAnswers.length;

        if (qIndex < 4) {
          setChatMessages(function(prev) { return [...prev, { role: "assistant", content: QUESTIONS[qIndex] }]; });
          setTimeout(function() { if (inputRef.current) inputRef.current.focus(); }, 100);
        } else {
          setPhase("generating");
          setLoading(true);
          try {
            const system =
              "You are an elite prompt engineer. Craft a single ready-to-use Claude prompt based on these 4 answers.\n\n" +
              "Rules:\n" +
              "- Include the user's context and goal upfront\n" +
              "- Specify an explicit output format (table, bullets, steps, word count, etc.)\n" +
              "- Assign Claude a role or expert lens to reason from\n" +
              "- Mention what has already been tried or constraints\n" +
              "- End with a request to critique or stress-test, not just create\n\n" +
              "Return ONLY the prompt text itself. No intro, no labels, no markdown wrapper. Just the prompt.";

            const userContent =
              "Goal: " + newAnswers[0] + "\n" +
              "Background: " + newAnswers[1] + "\n" +
              "Constraints/Already tried: " + newAnswers[2] + "\n" +
              "Ideal output: " + newAnswers[3];

            const prompt = await callClaude(system, userContent);
            setGeneratedPrompt(prompt);
            setPhase("done");
          } catch (e) {
            setErrMsg("API error: " + e.message);
            setPhase("chat");
          }
          setLoading(false);
        }
      }

      function copyPrompt() {
        navigator.clipboard.writeText(generatedPrompt);
        setCopied(true);
        setTimeout(function() { setCopied(false); }, 2500);
      }

      function restart() {
        setPhase("intro");
        setChatMessages([]);
        setAnswers([]);
        setInput("");
        setGeneratedPrompt("");
        setErrMsg("");
      }

      const qDone = answers.length;

      // ── Header ──────────────────────────────────────────────
      const header = h("div", {
        style: { width: "100%", maxWidth: 660, padding: "36px 0 22px", borderBottom: "1px solid #1e1c18", marginBottom: 28 }
      },
        h("div", { style: { fontSize: 10, letterSpacing: "0.22em", color: "#c8a96e", fontFamily: "monospace", marginBottom: 8 } },
          "PROMPT ENGINEERING STUDIO"),
        h("h1", { style: { fontSize: "clamp(20px,4vw,30px)", color: "#f0ead6", margin: 0, fontWeight: 400, letterSpacing: "-0.02em" } },
          "Top 1% Prompt Builder"),
        h("p", { style: { color: "#555", fontSize: 13, margin: "6px 0 0", lineHeight: 1.6 } },
          "Answer 4 questions. Get a prompt that gets exceptional results.")
      );

      // ── Intro section ────────────────────────────────────────
      const featureRows = [
        ["◎", "4 targeted questions", "No fluff — only what matters to craft your prompt"],
        ["◈", "Auto-crafted output",  "Built on all 5 top 1% principles"],
        ["◉", "Copy & paste ready",   "Use it immediately in any Claude conversation"]
      ].map(function(row) {
        const icon = row[0], label = row[1], desc = row[2];
        return h("div", { key: label, style: { display: "flex", gap: 14, marginBottom: 16, alignItems: "flex-start" } },
          h("div", { style: { color: "#c8a96e", fontSize: 17, minWidth: 22 } }, icon),
          h("div", null,
            h("div", { style: { color: "#e0d5bc", fontSize: 13.5, fontWeight: 600, marginBottom: 2 } }, label),
            h("div", { style: { color: "#4a4540", fontSize: 12.5 } }, desc)
          )
        );
      });

      const introSection = phase === "intro" && h("div", { style: { animation: "fadeUp .4s ease" } },
        h("div", { style: { background: "#161512", border: "1px solid #222", borderRadius: 14, padding: "26px 24px", marginBottom: 20 } },
          featureRows
        ),
        h("button", {
          onClick: startInterview,
          style: {
            width: "100%", padding: 15,
            background: "linear-gradient(135deg,#c8a96e,#a8854e)",
            border: "none", borderRadius: 11,
            color: "#0f0e0c", fontSize: 14, fontFamily: "Georgia,serif",
            fontWeight: 700, letterSpacing: ".04em", cursor: "pointer"
          }
        }, "Begin the Interview \u2192")
      );

      // ── Progress bar ─────────────────────────────────────────
      const progressBar = (phase === "chat" || phase === "generating") &&
        h("div", { style: { display: "flex", gap: 5, marginBottom: 22 } },
          [1, 2, 3, 4].map(function(n) {
            return h("div", {
              key: n,
              style: { flex: 1, height: 3, borderRadius: 4, background: n <= qDone ? "#c8a96e" : "#1e1c18", transition: "background .4s" }
            });
          })
        );

      // ── Message bubbles ──────────────────────────────────────
      const messageBubbles = chatMessages.map(function(m, i) {
        return h("div", {
          key: i,
          className: "msg",
          style: { display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }
        },
          h("div", {
            style: {
              maxWidth: "83%",
              background:   m.role === "user" ? "#1a1814" : "#161512",
              border:       "1px solid " + (m.role === "user" ? "#2a2620" : "#202020"),
              borderRadius: m.role === "user" ? "14px 14px 3px 14px" : "14px 14px 14px 3px",
              padding: "12px 16px",
              color:   m.role === "user" ? "#bfb090" : "#cec3a8",
              fontSize: 13.5, lineHeight: 1.75, whiteSpace: "pre-wrap"
            }
          },
            m.role === "assistant"
              ? h("span", { style: { color: "#c8a96e", fontSize: 10, letterSpacing: ".18em", display: "block", marginBottom: 5, fontFamily: "monospace" } }, "CLAUDE")
              : null,
            m.content
          )
        );
      });

      // ── Typing indicator ─────────────────────────────────────
      const typingIndicator = (phase === "generating" && loading)
        ? h("div", { className: "msg", style: { display: "flex", justifyContent: "flex-start" } },
            h("div", { style: { background: "#161512", border: "1px solid #202020", borderRadius: "14px 14px 14px 3px", padding: "10px 16px" } },
              h("span", { style: { color: "#c8a96e", fontSize: 10, letterSpacing: ".18em", display: "block", marginBottom: 4, fontFamily: "monospace" } },
                "CRAFTING YOUR PROMPT..."),
              h(TypingDots, null)
            )
          )
        : null;

      // ── Error box ────────────────────────────────────────────
      const errorBox = errMsg
        ? h("div", { style: { background: "#1a0e0e", border: "1px solid #4a2020", borderRadius: 10, padding: "12px 16px", marginBottom: 16, color: "#c87070", fontSize: 13 } },
            "\u26A0 " + errMsg)
        : null;

      // ── Generated prompt card ────────────────────────────────
      const promptCard = (phase === "done" && generatedPrompt)
        ? h("div", {
            className: "msg",
            style: { background: "#0b1810", border: "1px solid #1a3a22", borderRadius: 14, padding: "22px 22px 18px", marginBottom: 16 }
          },
            h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 } },
              h("span", { style: { fontSize: 10, letterSpacing: ".2em", color: "#4caf70", fontFamily: "monospace" } },
                "\u2736 YOUR TOP 1% PROMPT"),
              h("button", {
                onClick: copyPrompt,
                style: {
                  background: copied ? "#162b1c" : "transparent",
                  border: "1px solid " + (copied ? "#4caf70" : "#2a4a32"),
                  borderRadius: 7, padding: "4px 13px",
                  color: copied ? "#4caf70" : "#3d7a4d",
                  fontSize: 11.5, cursor: "pointer", fontFamily: "monospace", transition: "all .2s"
                }
              }, copied ? "\u2713 Copied!" : "Copy")
            ),
            h("div", { style: { color: "#aecfb8", fontSize: 13.5, lineHeight: 1.8, whiteSpace: "pre-wrap", borderTop: "1px solid #1a3a22", paddingTop: 14 } },
              generatedPrompt)
          )
        : null;

      // ── Input box ────────────────────────────────────────────
      const inputBox = phase === "chat"
        ? h("div", { style: { background: "#161512", border: "1px solid #272420", borderRadius: 12, padding: "4px 4px 4px 14px", display: "flex", alignItems: "flex-end", gap: 8 } },
            h("textarea", {
              ref: inputRef,
              value: input,
              onChange: function(e) { setInput(e.target.value); },
              onKeyDown: function(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitAnswer(); } },
              placeholder: "Type your answer\u2026",
              rows: 1,
              style: { flex: 1, background: "transparent", border: "none", color: "#cec3a8", fontSize: 13.5, lineHeight: 1.65, fontFamily: "Georgia,serif", padding: "11px 0", maxHeight: 110, overflowY: "auto" },
              onInput: function(e) { e.target.style.height = "auto"; e.target.style.height = Math.min(e.target.scrollHeight, 110) + "px"; }
            }),
            h("button", {
              onClick: submitAnswer,
              disabled: !input.trim(),
              style: {
                background: input.trim() ? "#c8a96e" : "#201e1a",
                border: "none", borderRadius: 9, width: 38, height: 38, minWidth: 38,
                color: input.trim() ? "#0f0e0c" : "#383430",
                fontSize: 15, cursor: input.trim() ? "pointer" : "default",
                display: "flex", alignItems: "center", justifyContent: "center",
                marginBottom: 4, transition: "all .2s"
              }
            }, "\u2192")
          )
        : null;

      // ── Restart button ───────────────────────────────────────
      const restartBtn = phase === "done"
        ? h("button", {
            onClick: restart,
            style: { width: "100%", padding: 13, background: "transparent", border: "1px solid #222", borderRadius: 11, color: "#555", fontSize: 13, cursor: "pointer", fontFamily: "Georgia,serif", letterSpacing: ".04em", transition: "all .2s" },
            onMouseEnter: function(e) { e.currentTarget.style.borderColor = "#3a3830"; e.currentTarget.style.color = "#888"; },
            onMouseLeave: function(e) { e.currentTarget.style.borderColor = "#222";    e.currentTarget.style.color = "#555"; }
          }, "\u21BA Build another prompt")
        : null;

      // ── Chat / generating / done wrapper ─────────────────────
      const chatSection = (phase === "chat" || phase === "generating" || phase === "done")
        ? h("div", null,
            progressBar,
            h("div", { style: { display: "flex", flexDirection: "column", gap: 14, marginBottom: 18 } },
              messageBubbles,
              typingIndicator,
              h("div", { ref: bottomRef })
            ),
            errorBox,
            promptCard,
            inputBox,
            restartBtn
          )
        : null;

      // ── Root ─────────────────────────────────────────────────
      return h("div", {
        style: { minHeight: "100vh", background: "#0f0e0c", display: "flex", flexDirection: "column", alignItems: "center", fontFamily: "Georgia, serif", padding: "0 16px 48px" }
      },
        header,
        h("div", { style: { width: "100%", maxWidth: 660 } },
          introSection,
          chatSection
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(PromptBuilder, null));
  </script>
</body>
</html>
